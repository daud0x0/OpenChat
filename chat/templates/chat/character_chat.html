<!-- chat_with_character.html -->
{% extends 'chat/layout.html' %}

{% block title %}
Chat with {{ character.name }}
{% endblock %}

{% block body %}
<div class="container h-100">
  <div class="chat-layout">
    <!-- Character Info Sidebar -->
    <div class="chat-sidebar justify-content-center justify-content-md-start">
      <img src="{{ character.image.url }}" alt="{{ character.name }}">
      <h2 class="h4 mb-2">{{ character.name }}</h2>
      <p class="text-muted small mb-0">{{ character.description }}</p>
    </div>

    <!-- Main Chat Window -->
    <div class="chat-main glass-panel d-flex flex-column h-100 w-100">
      
      <!-- Messages Area -->
      <div class="chat-messages" id="chat-messages">
        <!-- Initial greeting -->
        <div class="message ai">
          Hello! I'm {{ character.name }}. What would you like to talk about today?
        </div>
      </div>

      <!-- Input Area -->
      <div class="chat-input-area mt-auto">
        <input type="text" class="chat-input" placeholder="Type your message to {{ character.name }}..." id="message-input" autocomplete="off">
        <button class="btn-primary-custom px-4" type="button" id="send-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>

    </div>
  </div>
</div>

<script type="text/javascript">
  const url = window.location.href;
  const sendBtn = document.getElementById('send-btn');
  const messageInput = document.getElementById('message-input');
  const chatMessages = document.getElementById('chat-messages');

  function sendMessage() {
    const message = messageInput.value.trim();
    if (!message) return;

    // Add User Message Bubble
    appendMessage(message, 'user');
    messageInput.value = '';

    // Show modern typing indicator
    const typingId = 'typing-' + Date.now();
    const typingIndicator = document.createElement('div');
    typingIndicator.id = typingId;
    typingIndicator.className = 'typing-dots message ai mt-2';
    typingIndicator.innerHTML = '<span></span><span></span><span></span>';
    chatMessages.appendChild(typingIndicator);
    scrollToBottom();

    // Fetch response
    fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': '{{ csrf_token }}'
      },
      body: JSON.stringify({ 'message': message })
    })
    .then(response => {
      if (!response.ok) throw new Error('Network response was not ok');
      return response.json();
    })
    .then(data => {
      // Remove typing indicator
      const loader = document.getElementById(typingId);
      if (loader) loader.remove();

      // Add AI Message Bubble
      appendMessage(data['message'], 'ai');
    })
    .catch(error => {
      console.error('Error:', error);
      const loader = document.getElementById(typingId);
      if (loader) loader.remove();
      appendMessage("Sorry, I encountered an error connecting to the AI brain.", 'ai text-danger');
    });
  }

  function appendMessage(text, typeClass) {
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${typeClass} mt-2`;
    
    // Convert newlines to br if ai message, basic sanitization
    msgDiv.innerHTML = text.replace(/\ng/g, '<br>');
    chatMessages.appendChild(msgDiv);
    scrollToBottom();
  }

  function scrollToBottom() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  sendBtn.addEventListener('click', sendMessage);
  messageInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      sendMessage();
    }
  });

</script>


{% endblock %}
