{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS grid for layout simplicity -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Styles -->
    <link href="{% static 'css/styles.css' %}" rel="stylesheet">
    <title>{% block title %}{% endblock %} | OpenChat</title>
  </head>
  <body>
    <!-- Glassmorphic Navbar -->
    <nav class="navbar navbar-expand-lg glass-nav">
      <div class="container">
        <a class="navbar-brand text-gradient" href="/">OpenChat</a>
        <button class="navbar-toggler navbar-dark border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="/">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'about' %}">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="https://github.com/daud0x0/OpenChat.git">Source Code</a>
            </li>
          </ul>
          <form class="d-flex" method="GET" action="{% url 'search' %}">
            <input class="form-control-glass me-2" type="search" placeholder="Search characters..." aria-label="Search" name="q">
            <button class="btn btn-glass" type="submit">Search</button>
          </form>
        </div>
      </div>
    </nav>
    
    <main class="flex-grow-1">
      {% block body %}
      {% endblock %}
    </main>

    <footer>
      <div class="container">
        <p class="mb-0">Designed & Built with <span class="text-danger" aria-label="love">&hearts;</span> for a premium experience.</p>
        <p class="mb-0 mt-2 small">&copy; 2024 OpenChat. All rights reserved.</p>
      </div>
    </footer>

    <!-- Bootstrap JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Optional: Add global micro-interactions or scripts here -->
  </body>
</html>
